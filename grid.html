<style>
    body{
        margin: 0;
        padding: 0;
    }
    .grid{
        display: grid;
        background-color: blue;
        grid-template-columns:repeat(5,1fr,1fr);
        grid-template-rows: 0.3fr 1fr 1fr 0.3fr;
        height: 100vh;
        gap: 20px;
        padding: 20px;

    }
    .box{
        border-radius: 50px;
        overflow: hidden;
    }
    .b1{
        grid-column: span 6;
        text-align: center;
        background-color: white;
        font-size:small;
        align-items: center;
        justify-content: center;
        color: aqua;
        display: flex;
    }
    .b8{
        grid-column: span 6;
        text-align: center;
        background-color: white;
        font-size: small;
        align-items: center;
        justify-content: center;
        display: flex;
         color: aqua;
    }
    .box img{
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: all 2s ease-in-out;
    }
    .box:hover{
        transform: scale(0.9);
    }
    @media(max-width:500px){
        .grid{
            grid-template-columns: 1fr 1fr ;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 50%;
        }
        .b1{
            width: 100%;
            font-size: 20px;
            text-align: center;
        }
        .b8{
            width: 100%;
            font-size: 25px;
            text-align: center;
        }
        .box img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .box{
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
    }
</style>
